<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MTracker</title>

    <!-- Chart -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="css/main.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"
    />

    <!-- Favicon -->
    <link
      rel="shortcut icon"
      href="assets/logo/MTracker-Logo.svg"
      type="image/x-icon"
    />
  </head>
  <body>
    <div class="block bg-gray-50 lg:flex lg:h-screen lg:w-full">
      <aside
        class="bg-second-black-custom fixed top-24 -left-full z-50 m-5 flex h-[calc(100vh-120px)] w-[70%] flex-col justify-between rounded-xl border border-gray-100 p-5 shadow-md transition-all duration-300 md:w-[50%] lg:relative lg:top-0 lg:left-0 lg:m-0 lg:h-full lg:w-64 lg:rounded-none lg:border-0 lg:shadow-none"
        id="aside"
      >
        <div class="flex flex-col gap-10">
          <img
            src="assets/logo/Logo-Transparent-White.png"
            alt="MTracker"
            class="w-32"
          />
          <nav class="flex flex-col gap-3">
            <a
              href="#"
              class="hover:bg-black-custom focus:bg-primary rounded p-3 text-lg font-medium text-white transition-colors"
            >
              📊 Dashboard
            </a>
            <a
              href="transaction.html"
              class="hover:bg-black-custom focus:bg-primary rounded p-3 text-lg font-medium text-white transition-colors"
            >
              💸 Transaksi
            </a>
          </nav>
        </div>

        <div class="border-t border-gray-800 pt-4 lg:border-0">
          <p class="text-xs text-gray-400">v1.0.0</p>
        </div>
      </aside>
      <div class="flex min-w-0 flex-1 flex-col">
        <header
          class="m-5 rounded-xl border border-gray-100 bg-white p-4 shadow-md"
        >
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-5">
              <button
                type="button"
                title="hamburgermenu"
                id="hamburgermenu"
                class="cursor-pointer text-gray-600 hover:text-gray-900 lg:hidden"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.5"
                  stroke="currentColor"
                  class="size-8"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"
                  />
                </svg>
              </button>

              <div class="space-y-0.5">
                <p
                  class="text-primary text-lg font-semibold md:text-xl lg:text-2xl"
                >
                  Halo, Selamat Datang!
                </p>
                <p class="text-xs text-gray-500 md:text-sm lg:text-base">
                  Yuk pantau keuanganmu hari ini.
                </p>
              </div>
            </div>
          </div>
        </header>
        <main class="min-h-auto flex-1 px-5 pb-5 lg:overflow-y-auto">
          <div>
            <section
              class="mb-5 rounded-xl border border-gray-100 bg-white px-4 py-7 shadow-md"
            >
              <div class="grid grid-cols-1 gap-4 md:grid-cols-2 lg:grid-cols-3">
                <!-- Total Saldo -->
                <div class="rounded-xl border border-gray-100 bg-gray-50 p-4">
                  <div class="mb-2 flex items-center justify-between">
                    <span class="text-sm font-medium text-gray-500"
                      >Total Saldo</span
                    >
                    <div
                      class="flex h-8 w-8 items-center justify-center rounded-lg bg-indigo-100"
                    >
                      <i class="ti ti-wallet text-indigo-500"></i>
                    </div>
                  </div>
                  <p
                    class="text-xl font-semibold text-gray-800"
                    id="totalSaldo"
                  >
                    Rp 500.000
                  </p>
                </div>

                <!-- Total Pemasukan -->
                <div class="rounded-xl border border-gray-100 bg-gray-50 p-4">
                  <div class="mb-2 flex items-center justify-between">
                    <span class="text-sm font-medium text-gray-500"
                      >Total Pemasukan</span
                    >
                    <div
                      class="flex h-8 w-8 items-center justify-center rounded-lg bg-green-100"
                    >
                      <i class="ti ti-trending-up text-green-500"></i>
                    </div>
                  </div>
                  <p
                    class="text-xl font-semibold text-green-600"
                    id="totalPemasukan"
                  >
                    +Rp 6.700.000
                  </p>
                </div>

                <!-- Total Pengeluaran -->
                <div class="rounded-xl border border-gray-100 bg-gray-50 p-4">
                  <div class="mb-2 flex items-center justify-between">
                    <span class="text-sm font-medium text-gray-500"
                      >Total Pengeluaran</span
                    >
                    <div
                      class="flex h-8 w-8 items-center justify-center rounded-lg bg-red-100"
                    >
                      <i class="ti ti-trending-down text-red-500"></i>
                    </div>
                  </div>
                  <p
                    class="text-xl font-semibold text-red-600"
                    id="totalPengeluaran"
                  >
                    -Rp 420.000
                  </p>
                </div>
              </div>
            </section>
            <section
              class="flex h-[400px] flex-col rounded-xl border border-gray-100 bg-white px-4 py-7 shadow-md lg:h-[calc(100vh-280px)]"
            >
              <h2 class="mb-6 text-lg font-semibold">Ringkasan Keuangan</h2>
              <div
                class="relative flex min-h-0 flex-1 items-center justify-center"
              >
                <canvas
                  id="summaryChart"
                  class="max-h-full max-w-full"
                ></canvas>
              </div>
            </section>
          </div>
        </main>
      </div>
    </div>
    <script src="js/app.js"></script>
    <script type="module" src="js/dashboard.js"></script>
  </body>
</html>
